name: CI/CD pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  test:
    runs-on: ubuntu-26.04  

    env:
      Solution_Name: file-share-solution.sln                        
      Format_Test_Project_Path: format-test/format-test.csproj                
      Server_Core_Test_Project_Path: server-core-test/server-core-test.csproj
      Server_Build_Path: file-share-solution/server-core/bin/Debug/net10.0/server-core.dll
      
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1 #Only need latest commit

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    
    #Restore before running
    - name: Restore
      run: dotnet restore $Solution_Name

    # Execute all unit tests in the solution
    - name: Execute format test
      run: dotnet test $Format_Test_Project_Path

    - name: Execute server core test
      run: dotnet test $Server_Core_Test_Project_Path
      
  build:
    environment:
      name: Production
    runs-on: ubuntu-26.04 
    steps:
     # Install docker stuff
    - name: Build and push Docker images
      uses: docker/build-push-action@v7.3.0  
      
    #Sign into docker hub
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PAT }}
        
    #QEMU ig, going to have linux/amd64 and linux/arm64
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
        
    #Buidling the docker image
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
  
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        file: ./server.Dockerfile
        push: true
        platforms: |
          linux/amd64
          linux/arm64
        tags: |
          munna00/file-sharing-server:latest 
          munna00/file-sharing-server:${{ github.sha }} 
          
  deploy:
    environment:
        name: Production
    needs: [test,build]
    runs-on: ubuntu-26.04  
    steps:
    - name: ssh into VM
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ vars.SERVER_IP }}
        username: ${{ vars.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          docker pull munna00/file-sharing-server:latest
          docker stop file-sharing-deployed || true
          docker rm -f file-sharing-deployed || true
          docker run --name file-sharing-deployed -d -p 13000:13000 munna00/file-sharing-server:latest
